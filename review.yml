    summary: >-
      UW-Madison (QS World 2025 #46) operates a mature, formal API Program run by
      DoIT with a public developer portal at developer.wisc.edu, an Apigee API
      gateway, OAuth2 client-credentials auth, and published JSON:API/OpenAPI
      standards. I verified the portal and documented APIs (Person, HR, Curricular
      Data Model, DARS) return HTTP 200. Production APIs are access-gated requiring
      institutional approval, with openly published mock variants for development;
      no base URLs or live endpoints are fabricated here. All cataloged entries map
      to confirmed live documentation pages.
