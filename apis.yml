aid: university-of-wisconsin-madison
name: University of Wisconsin-Madison
description: >-
  The University of Wisconsin-Madison is a public land-grant research university
  in Madison, Wisconsin, ranked #46 in the QS World University Rankings 2025. Its
  Division of Information Technology (DoIT) runs a formal API Program with a public
  developer portal at developer.wisc.edu, an Apigee-based API gateway, OAuth2
  client-credentials authentication, and published API standards based on JSON:API
  and OpenAPI. Documented enterprise APIs include the Person API, an HR API, the
  Curricular Data Model API, and the DARS (Degree Audit Reporting System) API.
  Most production APIs are gated and require institutional access requests, with
  mock variants published openly for development.
